<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — StudioCast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-logo">
      <span class="emoji">🎙️</span>
      <h1>Studio<span>Cast</span></h1>
      <p>Admin access only</p>
    </div>

    <form class="login-form" id="login-form" novalidate>
      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter admin password"
            required
            autocomplete="current-password"
          >
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="login-error" id="login-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-msg">Incorrect password.</span>
      </div>

      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>

    <p class="back-link" style="margin-top:20px">
      <a href="/">← Back to StudioCast</a>
    </p>
  </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>
